services:
  contentgraph:
    build: .
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - PORT=3100
      - HOSTNAME=0.0.0.0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    restart: unless-stopped
